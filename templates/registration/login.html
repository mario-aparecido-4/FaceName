{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACENAME - Login</title>
    
    <link rel="icon" href="{% static 'img/Icon_logo.png' %}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0a389f, #3c8260, #052633);
            font-family: Arial, sans-serif;
        }

        /*Geral*/
        .geral {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 5vh;
            height: 100vh;
            box-sizing: border-box;
        }

        /*logo + "FACENAME"*/
        .cabecalho {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 5vh;
        }

        .logo-cabecalho {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        .titulo-principal {
            text-align: center;
            color: white;
            font-size: 5vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 2px;
            margin: 0;
        }

        /*imagem + formulário*/
        main.container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background-color: #cfcfcf;
            border-radius: 15px;
            overflow: hidden;
            width: 80vw;
            max-width: 900px;
            height: 60vh;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            margin-bottom: 10vh;
        }

        /*Lado esquerdo*/
        .logo {
            background-color: #052633;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /*Lado direito*/
        form {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .titulo-form {
            font-size: 3vh;
            margin-bottom: 20px;
            padding-left: 8%;
            color: #333;
        }

        /* Estilo para erros de login */
        .alert-error {
            background-color: #ffdddd;
            color: #d8000c;
            border: 1px solid #d8000c;
            padding: 10px;
            margin: 0 auto 15px auto;
            border-radius: 5px;
            font-size: 0.9rem;
            width: 80%;
            text-align: center;
            box-sizing: border-box;
        }

        /* Caixa de Login e Senha */
        .input-box {
            margin-bottom: 15px;
        }

        .input-box p {
            margin: 0;
            margin-left: 8%;
            padding-top: 3%;
            padding-bottom: 1%;
            font-family: 'Segoe UI';
            font-weight: bold;
            font-size: 0.9rem;
            color: #555;
        }

        /* Container relativo para posicionar o ícone dentro */
        .input-wrapper {
            position: relative;
            width: 80%;
            margin: 0 auto;
        }

        .input-wrapper input {
            width: 100%; /* Ocupa todo o wrapper */
            height: 6vh;
            padding: 0 40px 0 10px; /* Espaço extra na direita para o ícone não cobrir o texto */
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
            box-sizing: border-box; /* Garante que o padding não estoure o tamanho */
        }

        .input-wrapper input:focus {
            outline: 2px solid #052633;
            background-color: #fff;
        }

        /* Estilo do Ícone */
        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%); /* Centraliza verticalmente exato */
            color: rgba(0, 0, 0, 0.5); /* Preto com transparência (cinza) */
            font-size: 1.2rem;
            pointer-events: none; /* Permite clicar através do ícone */
        }

        /*Botão de login*/
        button {
            display: block;
            margin: 4% auto 0 auto;
            width: 82%;
            height: 6vh;
            background-color: #052633;
            color: #cfcfcf;
            font-size: 3vh;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #0a389f;
            color: white;
        }

        .cadastrar {
            text-align: center;
            margin-top: 15px;
        }
        
        .cadastrar p {
            font-size: 0.9rem;
        }

        /* Responsivo */
        @media (max-width: 768px) {
            main.container {
                grid-template-columns: 1fr;
                height: auto;
                width: 90vw;
            }

            .logo {
                display: none;
            }

            form {
                padding: 40px 20px;
            }

            .cabecalho {
                flex-direction: column;
                gap: 10px;
            }
            
            .titulo-principal {
                font-size: 4vh;
            }
        }
    </style>
</head>
<body>
  <div class="geral">
    <div class="cabecalho">
      <img class="logo-cabecalho" src="{% static 'img/logo_ifal.png' %}" alt="IFAL_LOGO">
      <h1 class="titulo-principal">FACENAME</h1>
    </div>

    <main class="container">
      <div class="logo">
        <img src="{% static 'img/Icon_logo.png' %}" alt="LOGO_FACENAME">
      </div>

      <form action="{% url 'login' %}" method="post">
        {% csrf_token %} 
        
        <h1 class="titulo-form">BEM VINDO(A) 👋</h1>

        {% if form.errors %}
            <div class="alert-error">
                Usuário ou senha inválidos.
            </div>
        {% endif %}

        <div class="input-box">
          <p>LOGIN</p>
          <div class="input-wrapper">
              <input name="username" placeholder="Digite seu usuário..." type="text" required autofocus>
              <i class="bi bi-person input-icon"></i>
          </div>
        </div>

        <div class="input-box">
          <p>SENHA</p>
          <div class="input-wrapper">
              <input name="password" placeholder="Digite sua senha..." type="password" required>
              <i class="bi bi-lock input-icon"></i>
          </div>
        </div>

        <button type="submit">ENTRAR</button>

        <div class="cadastrar">
          <small class="text-muted">Facename Dashboard Acadêmico &copy; {% now "Y" %}</small>
        </div>
      </form>
    </main>
  </div>
</body>
</html>
